<!doctype html>
<html lang="en"><head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Northwind Checkout</title>
  <link rel="stylesheet" href="./demo.css?v=f5961c168a" />
</head><body>
  <div class="wrap">
    <div class="topbar">
      <div class="mark">N</div>
      <div>
        <h1>Northwind Checkout</h1>
        <p>Plan reservation</p>
      </div>
    </div>

    <div class="card">
      <h2>Reservation</h2>
      <form id="reservation">
        <div class="row">
          <div class="field">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Ada Lovelace" />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="ada@example.com" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="plan">Plan</label>
            <select id="plan">
              <option>Starter</option>
              <option>Standard</option>
              <option>Enterprise</option>
            </select>
          </div>
          <div class="field">
            <label for="seats">Seats</label>
            <input type="number" id="seats" value="1" min="1" />
          </div>
        </div>
        <div class="actions">
          <div id="status" class="status"></div>
          <button type="submit" id="submit" class="btn">Reserve plan</button>
        </div>
      </form>
    </div>
  </div>
  <script type="module" src="./frame-agent.js?v=f5961c168a"></script>
  <script>
    document.getElementById('submit').addEventListener('click', function (e) {
      if (e.target.closest('form')) e.preventDefault();
      var name = document.getElementById('name').value || 'Customer';
      var planSelect = document.getElementById('plan');
      var plan = planSelect.options[planSelect.selectedIndex].value;
      var seats = document.getElementById('seats').value;
      var status = document.getElementById('status');
      status.textContent = 'Reserved ' + plan + ' for ' + name;
      status.classList.add('ok');
      console.log('order:submitted', { name: name, plan: plan, seats: seats });
    });
  </script>
</body></html>
